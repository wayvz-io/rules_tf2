name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # RBE mode: executed remotely on the lab Buildbarn cluster, driven by our
  # self-hosted ARC runner (`bb-ci-worker`) which runs *inside* the cluster with
  # Bazel 9.1.1 preinstalled. Because the runner is in-cluster it reaches
  # Buildbarn directly over plain gRPC via Kubernetes Service DNS — no Tailscale,
  # no gateway, no TLS, and none of the setup-bazel/free-disk dance a
  # GitHub-hosted runner needed. The local podman cluster in //tools/rbe-local
  # remains available for offline/self-contained runs.
  #
  # The runner + endpoints are defined in the iac repo (clusters/k3s-office/
  # github-actions-runner + buildbarn). The committed .bazelrc never carries the
  # endpoint; local dev uses .bazelrc.user.
  rbe:
    name: Test (RBE)
    # Skip the guaranteed-red pre-regen run on the mirror branch: a Renovate
    # versions.json bump lands .tf/lock out of sync until renovate-tf-regen.yml
    # commits the regenerated files, so testing the raw bump always fails. That
    # workflow re-dispatches CI on the regenerated head, so tests run once, green.
    if: >-
      github.event_name != 'pull_request' ||
      github.head_ref != 'renovate/terraform-provider-mirror'
    runs-on: bb-ci-worker
    # Cap runaway/wedged jobs. Without this GitHub's default is 6h, so a stuck
    # self-hosted runner blocks the (single) queue slot for hours.
    timeout-minutes: 30
    env:
      BES_BACKEND: grpc://bb-portal.buildbarn:8082
      # Human-facing https UI link Bazel prints for the invocation.
      BES_RESULTS_URL: https://bb-portal.lab.wayvz.io/bazel-invocations/
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Build and test on RBE (via bb-clientd)
        # The runner's job hook starts bb-clientd — a local caching proxy whose
        # CAS lives on a persistent PVC (warm across runs). Bazel talks to its
        # unix socket; clientd forwards to the in-cluster frontend, selected by
        # --remote_instance_name (its config's cluster key).
        #
        # output_user_root ALSO lives on the PVC (/clientd), so the extracted
        # external repos + analysis cache persist across the ephemeral runner
        # pods. This is the big win: with a cold (ephemeral) output base a fully
        # cached build still spends ~210s re-extracting toolchains and analysing;
        # warm, that drops to ~8s. repository_cache stays on the PVC too.
        #
        # This job is intermittently flaky (transient RBE/CAS hiccups) in a way a
        # plain repeat clears, so retry once *in the same step* rather than via a
        # job-level rerun: staying on this runner pod keeps that warm output base,
        # so the retry is the ~8s cached rebuild — a fresh worker would re-pay the
        # ~210s cold extraction.
        run: |
          run_tests() {
            bazel --output_user_root=/clientd/bazel test --config=remote \
              --remote_executor=unix:///clientd/bb_clientd/grpc \
              --remote_cache=unix:///clientd/bb_clientd/grpc \
              --remote_instance_name=frontend.buildbarn \
              --repository_cache=/clientd/bazel-repo-cache \
              --bes_backend="$BES_BACKEND" \
              --bes_results_url="$BES_RESULTS_URL" \
              //...
          }
          run_tests || {
            echo "::warning::RBE test run failed; retrying once on the same runner (warm cache)."
            run_tests
          }

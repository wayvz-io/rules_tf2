name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Local mode: the default stock/hermetic toolchains on a bare runner.
  local:
    name: Test (local)
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v5

      # The hermetic LLVM CC toolchain unpacks ~2.5GB; reclaim preinstalled
      # bloat so it fits on the runner's root disk.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /opt/hostedtoolcache/CodeQL /usr/local/.ghcup || true
          sudo docker image prune --all --force || true
          df -h /

      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true

      - name: Build and test
        env:
          # Force the pinned Bazel; setup-bazel/bazelisk otherwise defaults to
          # latest and ignores .bazelversion (setup-bazel does not honor it).
          USE_BAZEL_VERSION: "9.1.1"
        run: bazel test //...

  # RBE mode: the same build executed remotely on the shared lab Buildbarn
  # cluster, reached over Tailscale (ephemeral OIDC node — no long-lived key).
  # Proves the stock toolchains ship to a vanilla Ubuntu worker with no
  # /nix/store and no special preparation. The local podman cluster in
  # //tools/rbe-local remains available for offline/self-contained runs.
  #
  # Requires (configured out of band, not in this repo):
  #   - secrets.TS_OAUTH_CLIENT_ID / secrets.TS_AUDIENCE — Tailscale OIDC client.
  #   - Tailnet ACL allowing tag:ci-server to reach the gateway on :8980 (and :53
  #     for MagicDNS). See the cluster runbook in the iac repo.
  # The endpoint lives here (the committed .bazelrc never carries it; local dev
  # uses .bazelrc.user instead).
  rbe:
    name: Test (RBE)
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # lets the Tailscale action mint a GitHub OIDC token
      contents: read
    env:
      RBE_EXECUTOR: grpc://bb.lab.wayvz.io:8980
    steps:
      - uses: actions/checkout@v5

      # RBE keeps compilation off the runner, but Bazel still fetches and
      # extracts the full external-repo/toolchain set locally (LLVM ~2.5GB, Go
      # SDK, protobuf) to build the action graph and upload inputs. Reclaim
      # preinstalled bloat so that plus the repository cache fits on /.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /opt/hostedtoolcache/CodeQL /usr/local/.ghcup || true
          df -h /

      - name: Connect to Tailscale (OIDC, ephemeral node)
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          audience: ${{ secrets.TS_AUDIENCE }}
          tags: tag:ci-server
          use-cache: true
          # Pull the tailnet DNS config so the RBE hostname resolves to the gateway.
          args: --accept-dns=true

      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          # No action cache persisted across runs, so this job keeps proving
          # actions execute on a cold worker (bazelisk/repo downloads still cached).
          disk-cache: false
          repository-cache: true

      - name: Build and test on RBE
        env:
          USE_BAZEL_VERSION: "9.1.1"
        # //docs builds fast on a cold worker now via prefer_prebuilt_protoc (.bazelrc).
        run: bazel test --config=remote --remote_executor="$RBE_EXECUTOR" //...

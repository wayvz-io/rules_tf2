name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      # The hermetic LLVM CC toolchain unpacks ~2.5GB; reclaim preinstalled
      # bloat so it fits on the runner's root disk.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /opt/hostedtoolcache/CodeQL /usr/local/.ghcup || true
          sudo docker image prune --all --force || true
          df -h /

      - uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true

      - name: Build and test
        env:
          # Force the pinned Bazel; setup-bazel/bazelisk otherwise defaults to
          # latest and ignores .bazelversion. Bazel 9 is a planned follow-up.
          USE_BAZEL_VERSION: "8.5.0"
        run: bazel test //...

name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# Grant the deploy-pages action permission to publish.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent Pages deploy; don't cancel a running one mid-publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build book
    # In-cluster self-hosted runner (Bazel 9.1.1 preinstalled). Building
    # //docs:book over RBE offloads Stardoc/protoc/toolchains to the Buildbarn
    # workers and — because the main CI job builds the same commit — is normally
    # a remote *cache hit*, so this just fetches book.tar.gz and publishes. No
    # free-disk / setup-bazel / toolchain downloads. Runs on main only (trusted
    # push, no fork-PR exposure of the self-hosted runner).
    runs-on: bb-ci-worker
    timeout-minutes: 30 # don't let a wedged runner hold the slot for GitHub's 6h default
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Build the book on RBE (via bb-clientd)
        # bb-clientd (started by the runner's job hook) is the local caching
        # proxy with a warm PVC-backed CAS; it forwards to the in-cluster
        # frontend. --remote_download_toplevel overrides the .bazelrc :remote
        # default (minimal) so book.tar.gz lands locally for packaging.
        # output_user_root on the PVC keeps the extracted repos + analysis cache
        # warm across runs (see the CI job — ~210s cold vs ~8s warm).
        run: |
          bazel --output_user_root=/clientd/bazel build //docs:book \
            --config=remote \
            --remote_executor=unix:///clientd/bb_clientd/grpc \
            --remote_cache=unix:///clientd/bb_clientd/grpc \
            --remote_instance_name=frontend.buildbarn \
            --repository_cache=/clientd/bazel-repo-cache \
            --remote_download_toplevel

      - name: Unpack rendered site
        run: |
          mkdir -p _site
          tar -xzf bazel-bin/docs/book.tar.gz -C _site

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: _site

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      # Whichever attempt published reports the live URL.
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    steps:
      # The Pages deploy fails transiently (Pages API hiccups) in a way a repeat
      # clears. Try once; if it fails, wait 5 minutes for the API to settle and
      # deploy again. The `pages` concurrency group has cancel-in-progress:false,
      # so the wait won't be interrupted by a follow-up push.
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
        continue-on-error: true
      - name: Wait before retrying the deploy
        if: steps.deployment.outcome == 'failure'
        run: sleep 300
      - id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5

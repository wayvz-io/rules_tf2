name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# Grant the deploy-pages action permission to publish.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent Pages deploy; don't cancel a running one mid-publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build book
    # In-cluster self-hosted runner (Bazel 9.1.1 preinstalled). Building
    # //docs:book over RBE offloads Stardoc/protoc/toolchains to the Buildbarn
    # workers and — because the main CI job builds the same commit — is normally
    # a remote *cache hit*, so this just fetches book.tar.gz and publishes. No
    # free-disk / setup-bazel / toolchain downloads. Runs on main only (trusted
    # push, no fork-PR exposure of the self-hosted runner).
    runs-on: bb-ci-worker
    steps:
      - uses: actions/checkout@v5

      - name: Build the book on RBE
        # --remote_download_toplevel overrides the .bazelrc :remote default
        # (minimal) so book.tar.gz lands locally for packaging.
        run: |
          bazel --output_user_root="${RUNNER_TEMP}/bazel" build //docs:book \
            --config=remote \
            --remote_executor=grpc://frontend.buildbarn:8980 \
            --remote_cache=grpc://frontend.buildbarn:8980 \
            --remote_download_toplevel

      - name: Unpack rendered site
        run: |
          mkdir -p _site
          tar -xzf bazel-bin/docs/book.tar.gz -C _site

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

name: Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v0.1.0, v1.0.0, etc.

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0  # Need full history for changelog generation

      # The hermetic LLVM CC toolchain unpacks ~2.5GB; reclaim preinstalled
      # bloat so it fits on the runner's root disk.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /opt/hostedtoolcache/CodeQL /usr/local/.ghcup || true
          sudo docker image prune --all --force || true
          df -h /

      - uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true

      - name: Run tests before release
        env:
          # Force the pinned Bazel; setup-bazel/bazelisk otherwise defaults to
          # latest and ignores .bazelversion (setup-bazel does not honor it).
          USE_BAZEL_VERSION: "9.1.1"
        run: |
          echo "Running tests to ensure release quality..."
          bazel test //...

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate Release Notes
        id: release_notes
        run: |
          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 ${{ steps.version.outputs.version }}^ 2>/dev/null || echo "")

          # Generate changelog
          if [ -n "$PREV_TAG" ]; then
            echo "## What's Changed" > release_notes.md
            echo "" >> release_notes.md
            git log --pretty=format:"* %s (%h)" $PREV_TAG..${{ steps.version.outputs.version }} >> release_notes.md
          else
            echo "## Initial Release" > release_notes.md
            echo "" >> release_notes.md
            echo "First release of rules_tf2 - Advanced Terraform rules for Bazel" >> release_notes.md
          fi

          echo "" >> release_notes.md
          echo "## Installation" >> release_notes.md
          echo "" >> release_notes.md
          echo "Add to your \`MODULE.bazel\`:" >> release_notes.md
          echo '```starlark' >> release_notes.md
          echo 'bazel_dep(name = "rules_tf2", version = "${{ steps.version.outputs.version }}")' >> release_notes.md
          echo 'archive_override(' >> release_notes.md
          echo '    module_name = "rules_tf2",' >> release_notes.md
          echo '    urls = ["https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.version }}/rules_tf2-${{ steps.version.outputs.version }}.tar.gz"],' >> release_notes.md
          echo '    strip_prefix = "rules_tf2-${{ steps.version.outputs.version }}",' >> release_notes.md
          echo ')' >> release_notes.md
          echo '```' >> release_notes.md

          # Save for later use
          cat release_notes.md

      - name: Create source archive
        run: |
          # Create a clean archive without .git and other unnecessary files
          VERSION="${{ steps.version.outputs.version }}"
          ARCHIVE_NAME="rules_tf2-${VERSION}"

          # Create a temporary directory
          mkdir -p /tmp/release

          # Export the repository without .git
          git archive --format=tar --prefix="${ARCHIVE_NAME}/" HEAD | tar -x -C /tmp/release/

          # Create the final tarball
          cd /tmp/release
          tar -czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}/"

          # Move it back to workspace
          mv "${ARCHIVE_NAME}.tar.gz" $GITHUB_WORKSPACE/

          # Calculate checksums
          cd $GITHUB_WORKSPACE
          sha256sum "${ARCHIVE_NAME}.tar.gz" > "${ARCHIVE_NAME}.tar.gz.sha256"

          echo "Archive created: ${ARCHIVE_NAME}.tar.gz"
          ls -lh "${ARCHIVE_NAME}.tar.gz"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          body_path: release_notes.md
          files: |
            rules_tf2-${{ steps.version.outputs.version }}.tar.gz
            rules_tf2-${{ steps.version.outputs.version }}.tar.gz.sha256
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-rc') || contains(steps.version.outputs.version, '-alpha') || contains(steps.version.outputs.version, '-beta') }}
          name: Release ${{ steps.version.outputs.version }}